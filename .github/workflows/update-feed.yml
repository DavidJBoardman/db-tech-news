# Scheduled feed refresh — fetches sources, rebuilds data/*.json, commits.
# Free on public repos. Cron is best-effort; expect occasional delays.
name: update-feed

on:
  schedule:
    - cron: "*/30 * * * *"   # ~every 30 min (GitHub may delay at busy times)
  workflow_dispatch: {}        # manual runs while developing

permissions:
  contents: write

concurrency:
  group: update-feed
  cancel-in-progress: false    # let a running refresh finish

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      # If scripts/fetch.js gains npm deps, add: npm ci (and commit a lockfile)
      - name: Run pipeline
        run: node scripts/fetch.js

      - name: Commit data if changed
        run: |
          git config user.name "signal-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No feed changes this run."
          else
            git commit -m "chore(data): refresh feed [skip ci]"
            git pull --rebase origin main
            git push
          fi
